<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica Vida Plena | Agendamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Clínica Vida Plena</h1>
      <p>Sistema de Agendamento de Consultas e Exames</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Novo Agendamento</h2>

      <form id="form-agendamento">
        <label for="especialidade">Especialidade</label>
        <select id="especialidade" required>
          <option value="">Selecione</option>
        </select>

        <label for="profissional">Profissional</label>
        <select id="profissional" required>
          <option value="">Selecione</option>
        </select>

        <label for="data">Data disponível</label>
        <select id="data" required>
          <option value="">Selecione</option>
        </select>

        <label for="nome">Nome</label>
        <input type="text" id="nome" required>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" required placeholder="Somente números">

        <button type="submit">Agendar</button>
      </form>

      <p id="mensagem"></p>
    </section>

    <section class="card">
      <h2>Consultar Agendamento por CPF</h2>

      <div class="consulta-box">
        <input type="text" id="cpf-consulta" placeholder="Digite o CPF">
        <button id="btn-consultar">Consultar</button>
      </div>

      <div id="resultado-consulta"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
